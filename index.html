<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script src="https://kit.fontawesome.com/91daa770d3.js" crossorigin="anonymous"></script>

  <title>Rock Paper Scheme | Work Management</title>

  <style>

    @import url('https://fonts.googleapis.com/css2?family=Archivo&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Jost&display=swap');
    
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    img.logo {
      display: block;
      width: 60vmin;   /* responsive size */
      height: auto;
      max-width: 90%;
      max-height: 90%;
    }

    div {
      font-weight: normal;
      display: block;
      line-height: 1.4;
      margin: auto;
      max-width: 600px;
      padding-left: 20px;
      padding-right: 20px;
      padding-bottom: 20px;
    }

    body {
      font-family: 'Jost', serif;
    }

    .sidebar {
      font-family: 'Archivo', sans-serif;
      font-size: 110%;
      color: #2f4f4f;
    }

    .description {
      font-size: 120%;
    }
  </style>
</head>
<body>
  <div>
    <img class="logo" src="logo.svg" alt="Rock Paper Scheme, logotype">
  </div>
  <div class="description">
    Rock Paper Scheme is a neighborhood agency focused on work management solutions. We offer consulting for tool and process needs.
  </div>
</body>
</html>
